<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../images_videos/images/forStyle/calendar.ico" type="image/x-icon">
    <title>Our especial dates</title>
    <link rel="stylesheet" href="../styles/mobile/allHeader.css">
    <link rel="stylesheet" href="../styles/mobile/allPages.css">
    <link rel="stylesheet" href="../styles/mobile/dates.css">
    <link rel="stylesheet" href="../styles/desktop/header.css" media="screen and (min-width: 768px)">
    <link rel="stylesheet" href="../styles/desktop/allPages.css" media="screen and (min-width: 768px)">
</head>
<body>
    <header>
        <span id="userLoged">
            <img src="" alt="The user image" id="userImage">
            <p id="userName"></p>
        </span>
        <nav onclick="toogleNavLinks()">
            <span id="menu">
                <div id="bar1" class="bar"></div>
                <div id="bar2" class="bar"></div>
                <div id="bar3" class="bar"></div>
            </span>
            <div id="navLinks">
                <h2>Quick acess</h2>
                <ul>
                    <li><a href="../index.html">🏠 Back home</a></li>
                    <li><a href="cardTrips.html">🗺️ Travels</a></li>
                    <li><a href="cardFellings.html">❤️ Fellings</a></li>
                    <li><a href="cardMemories.html">📷 Memories</a></li>
                    <li><a href="cardEvolution.html">📈 Evolution</a></li>
                    <li><a href="cardFamily.html">👩‍❤️‍💋‍👨 Our family</a></li>
                    <li><a href="cardDates.html">📆 Our dates</a></li>
                    <li><a href="cardLinks.html">🌐 Other sites</a></li>
                    <li><a href="cardUpdates.html">⬆️ Updates</a></li>
                    <li><a href="configs.html">⚙️ Configs</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <section>
            <div class="containerCalendar">
                <div class="calendar">
                    <span class="changeMonth">
                        <button class="prevButton">
                            <img src="../images_videos/images/forStyle/arrow.png" alt="arrow">
                        </button>
                        <p class="currentMonth"></p>
                        <button class="nextButton">
                            <img src="../images_videos/images/forStyle/arrow.png" alt="arrow">
                        </button>
                    </span>
                    <span class="days"></span>
                    <span class="numbers"></span>
                </div>
            </div>
            <span class="closestEvent">
                <h2 class="closestEventText">Proximo evento</h2>
                <span class="event">
                    <span class="firstSpan">
                        <p class="closestEventDate"></p>
                        <button class="toggleDescription" onclick="toggleDescription(event)">
                            <img src="../images_videos/images/forStyle/expandMore.png" alt="expand more image">
                        </button>
                    </span>
                    <span class="description">
                        <p></p>
                    </span>
                </span>
            </span>
            <span class="listOfDates">
                <ul>

                </ul>
            </span>
        </section>
    </main>
    <footer>© 2026 Giulio Cappellini.</footer>

    <script src="../scripts/header.js"></script>
    <script type="module" src="../scripts/calendar/main.js"></script>
</body>
</html>
