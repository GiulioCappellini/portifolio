    <script>
        const together = document.querySelector(".togetherSince");

        function unitLabel(value, singular, plural) {return value === 1 ? singular : plural};

        function getTimeTogether(startDate) {
            const now = new Date();

            let years = now.getFullYear() - startDate.getFullYear();
            let months = now.getMonth() - startDate.getMonth();
            let days = now.getDate() - startDate.getDate();

            if (days < 0) {
                months--;
                const prevMonthDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
                days += prevMonthDays;
            };
            if (months < 0) {
                years--;
                months += 12;
            };

            const diffMs = now - startDate;
            const totalHours = Math.floor(diffMs / 3600000);
            const hours = totalHours % 24;

            const parts = [];
            if (years > 0) parts.push(`${years} ${unitLabel(years, "Ano", "Anos")}`);
            if (months > 0) parts.push(`${months} ${unitLabel(months, "Mês", "Meses")}`);
            if (days > 0) parts.push(`${days} ${unitLabel(days, "Dia", "Dias")}`);
            if (hours > 0) parts.push(`${hours} ${unitLabel(hours, "Hora", "Horas")}`);
            if (parts.length === 0) return "";

            if (parts.length === 1) return `${parts[0]}`;
            if (parts.length === 2) return `${parts[0]} e ${parts[1]}`;
            return `${parts.slice(0, -1).join(", ")} e ${parts.at(-1)}`;
        };

        const startDate = new Date("2026-05-16T00:00:00");

        function renderTogether() {together.innerText = getTimeTogether(startDate)};

        renderTogether();
        
        let hourIntervalId = null;
        function startHourSync() {
            if (hourIntervalId) clearInterval(hourIntervalId);

            const now = new Date();
            const msUntilNextHour = (60 - now.getMinutes()) * 60000 - now.getSeconds() * 1000 - now.getMilliseconds();

            setTimeout(() => {
                renderTogether();
                hourIntervalId = setInterval(renderTogether, 3600000);
            }, Math.max(0, msUntilNextHour));
        };

        startHourSync();
    </script>
